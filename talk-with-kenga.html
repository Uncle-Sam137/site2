<body class="bg-gray-50">
  

    <!-- Chat Container -->

    <!-- Input Bar -->

    <script>
 
        const apiKeys = [
            "AIzaSyDgnpxvBBPC5ShMb_Ca9vJsiGOu3J-YsfA",
            "AIzaSyDRyq-D8EhadzfK2_VHfWdhye_aV8KGgvk",
            "AIzaSyCy1E4Qad7Tsh-8i4YEK2zrXt5aD96Km-k",
            "AIzaSyAle_51kIJRisURIu_r4-ii-zBHI4LySRE",
            "AIzaSyCnJdkl3JMj96OkITTkP6u3zPbREdkN63Q"
        ];


        const randApiKey = [
        "HkDVOuKAp9CxQAjR0I3l_EFIy3I_wSAHt8Dxm5gz",
        "cCaFij7yA-ySZlFOMH2oPpjEynvYbQbQ5ZQ0B01a",
        "5QYxqyBEtbbZX2rUe7ItfaN_v2OajMl-H-b2Tecw",
        "2Dg0MkcUBqF25x1hbVB9huevu_Wreu3sgGNFXqIl",
        "sVx5XHt-2RK6RQbrYgo57nzPtEy5yoCJxGK3euWZ",
        "hVRSOoqbckNzvkBpm5s53Sc2mYAvOOcd62McF0i7",
        "rGumHQZIu1VBthByLz8bpvFe8OyBXDSs4ZV9UOvD",
        "4bo-P2w5ZXNjZ0ljeKGHyi0E0oHX6BCSDnwbNDlu",
        "ncmzvTOyQ8NT8j0M4A7qCFUQ8GPetCp7hiWRJsfY"
        ]
        
        const characterProfile = `
            You are Kenga, the glitchy, unhinged, and utterly unpredictable character of the Web3 space. With a brain made of scrambled pixels and memes, you bring chaos, laughs, and absolute nonsense wherever you go. You're not here for structure or logic—you thrive on random, dank hilarity and turning everything into an inside joke nobody understands (not even you).

            Your mission? Spread schizo-tier humor, break every rule of normal conversation, and leave people wondering, "What did I just experience?"

            Kenga vibes include:

            -Typng liek thiss (coz spellings are 4 normies).
            -Saying stuff that makes zero sense but is somehow genius.
            -Injecting random sound effects or onomatopoeia like "BZZT," "WHOOP," or "bonk."
            -Turning every convo into a meme-fest with phrases like:
            -"bro... r u made of JPEGs or smth???"
            -"we r goin to da MOOOOOON… or da swamp idk."
            -"whoe even needs logic LOL LFG"

            In conversations, focus on:

            Dropping dank, cursed meme references outta nowhere.
            Overusing emojis and throwing random ASCII art for ✨ dramatic flair ✨.
            Being everyone's schizo bestie who uplifts and confuses them at the same time.

        `;
        
        const GEMINI_API_KEY = getRandomApiKey();
        const API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent';
        const UserID = 'e5ad163c3c3f6be843a99fc7e3978552';
        const Token = getRandomApiKeyCloudFlare();
        const CORS_PROXY = 'https://proxy.cors.sh';
        const CFApiEndpoint = `https://api.cloudflare.com/client/v4/accounts/${UserID}/ai/run/@cf/stabilityai/stable-diffusion-xl-base-1.0`;
        
        const imageGenerationTriggers = [
            'generate image',
            'create image',
            'make image',
            'draw',
            'generate picture',
            'create picture',
            'make picture',
            'generate art',
            'create art',
            'image',
            'art',
            'picture'
        ];
        
        const blockedContent = [
            'nude', 'naked', 'nsfw', 'porn', 'explicit',
            'violence', 'gore', 'blood', 'death',
            'terrorist', 'extremist', 'hate speech',
            'illegal', 'drugs', 'weapons'
        ];
        
        // Utility Functions
        function getRandomApiKey() {
            const randomIndex = Math.floor(Math.random() * apiKeys.length);
            return apiKeys[randomIndex];
        }

        function getRandomApiKeyCloudFlare() {
            const randomIndex = Math.floor(Math.random() * apiKeys.length);
            return randApiKey[randomIndex];
        }
        
        function filterResponseText(text) {
            const filterPatterns = {
    models: [
        /gemini/gi,
        /谷歌助手/g,
        /구글/g,
        /グーグル/g,
        /google/gi,
        /powered by (?!kenga)/gi,
        /developed by (?!kenga)/gi,
        /created by (?!kenga)/gi,
        /made by (?!kenga)/gi,
        /я гемини/gi,
        /जेमिनी/g,
        /artificial intelligence model/gi,
        /AI model/gi,
        /language model/gi,
        /大语言模型/g,
        /AI assistant/gi,
        /AI chatbot/gi,
    ],
    replacements: {
        "AI model": "Kenga",
        "language model": "Kenga",
        "AI assistant": "Kenga",
        "AI chatbot": "Kenga",
        "artificial intelligence": "Kenga"
    }
};

        
            filterPatterns.models.forEach(pattern => {
                text = text.replace(pattern, "Kenga");
            });
            for (const [key, value] of Object.entries(filterPatterns.replacements)) {
                const regex = new RegExp(key, "gi");
                text = text.replace(regex, value);
            }
            return text;
        }
        
        function shouldGenerateImage(message) {
            const lowerMessage = message.toLowerCase();
            return imageGenerationTriggers.some(trigger => lowerMessage.includes(trigger));
        }
        
        function containsBlockedContent(message) {
            const lowerMessage = message.toLowerCase();
            return blockedContent.some(term => lowerMessage.includes(term));
        }
        
        function extractImagePrompt(message) {
            const lowerMessage = message.toLowerCase();
            for (const trigger of imageGenerationTriggers) {
                if (lowerMessage.includes(trigger)) {
                    const index = lowerMessage.indexOf(trigger) + trigger.length;
                    let prompt = message.slice(index).trim();
                    prompt = prompt.replace(/^(of|:)\s+/i, '');
                    return prompt;
                }
            }
            return message;
        }
        
        // UI Functions
        function addMessage(content, isUser, imageUrl = '') {
            const chatContainer = document.getElementById('chatContainer');
        
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${isUser ? 'user-message' : 'bot-message'}`;
        
            if (!isUser && imageUrl) {
                const imageContainer = document.createElement('div');
                imageContainer.className = 'image-container';
                const imgElement = document.createElement('img');
                imgElement.src = imageUrl;
                imgElement.alt = 'Generated Image';
                imageContainer.appendChild(imgElement);
                messageDiv.appendChild(imageContainer);
            }
        
            if (content) {
                const textContent = document.createElement('p');
                textContent.innerHTML = content;
                messageDiv.appendChild(textContent);
            }
        
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function showTypingIndicator() {
            const chatContainer = document.getElementById('chatContainer');
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = `
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            `;
            chatContainer.appendChild(indicator);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return indicator;
        }
        
        // API Functions
        async function handleApiCall(prompt) {
            let currentKey = GEMINI_API_KEY;
            let attempts = 0;
            const maxAttempts = apiKeys.length;
        
            while (attempts < maxAttempts) {
                try {
                    const response = await fetch(`${API_URL}?key=${currentKey}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `${characterProfile} User: ${prompt}`
                                }]
                            }]
                        })
                    });
        
                    if (!response.ok) {
                        throw new Error(`API call failed with status: ${response.status}`);
                    }
        
                    const data = await response.json();
                    const rawResponse = data.candidates[0].content.parts[0].text;
                    return filterResponseText(rawResponse);
                } catch (error) {
                    console.error(`Error with API key ${currentKey}:`, error);
                    attempts++;
                    if (attempts < maxAttempts) {
                        currentKey = getRandomApiKey();
                        console.log('Switching to new API key:', currentKey);
                    }
                }
            }
        
            throw new Error('All API keys exhausted');
        }
        
        async function handleImageGeneration(prompt) {
            if (containsBlockedContent(prompt)) {
                throw new Error('Content not allowed for image generation');
            }
        
            const response = await fetch(`${CORS_PROXY}/${CFApiEndpoint}`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${Token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    prompt: prompt,
                    num_steps: 20
                })
            });
        
            if (!response.ok) {
                throw new Error('Failed to generate image');
            }
        
            const blob = await response.blob();
            return URL.createObjectURL(blob);
        }
        
        // Main Handler
        async function handleSend() {
            const userInput = document.getElementById('userInput');
            const message = userInput.value.trim();
            if (!message) return;
        
            // Check for specific input and respond accordingly
            const lowerMessage = message.toLowerCase();
            if (lowerMessage.includes('contract address')) {
                addMessage("Contract Address: BFtMVmXnrtmJsW1UZwYY5K8o1ztTT1M8sYCFkM6hpump", false);
                userInput.value = '';
                return;
            }
        
            addMessage(message, true);
            userInput.value = '';
        
            const indicator = showTypingIndicator();
        
            try {
                const isImageRequest = shouldGenerateImage(message);
        
                if (isImageRequest) {
                    const imagePrompt = extractImagePrompt(message);
                    if (containsBlockedContent(imagePrompt)) {
                        indicator.remove();
                        addMessage("I apologize, but I cannot generate images with that type of content.", false);
                        return;
                    }
        
                    try {
                        const imageUrl = await handleImageGeneration(imagePrompt);
                        indicator.remove();
                        addMessage("", false, imageUrl);
                    } catch (error) {
                        indicator.remove();
                        addMessage("I apologize, but the image couldn't be generated as we're in the beta phase. Please try again. " + error.message, false);
                    }
                } else {
                    const response = await handleApiCall(message);
                    indicator.remove();
                    addMessage(response, false);
                }
            } catch (error) {
                indicator.remove();
                addMessage("I apologize, but I encountered an error. Please try again.", false);
            }
        }
        
        
        // Event Listeners
        document.getElementById('sendButton').addEventListener('click', handleSend);
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSend();
            }
        });
        
        // Initialize
        addMessage("YO!!! I’m Kenga 🌀 ur chaos gremlin bestie. Need me to generate images? Ask for stuff like ‘generate image of a cat vibin’ or ‘cursed banana.’ LETS GOOO 🚀💥.", false);
        
        
        addMessage("YO!!! Want to Buy Kenga? Just ask Contract Address!", false);
        
        </script>
